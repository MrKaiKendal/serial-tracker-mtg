<!DOCTYPE html>
<html>
  <head>
    <title>Mox Jasper Tracker List</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <section class="page">
      <div class="card wide-card">
        <div class="badge">Serialized List</div>

        <h1>Known Mox Jasper Serials</h1>

        <p class="subtitle">
          This page tracks confirmed serialized Mox Jasper copies from #001 to #500.
          Unknown means the serial number has not been confirmed yet.
        </p>
<div class="search-box">
  <label for="serial-search">Search Serial Number</label>
  <input id="serial-search" type="number" min="1" max="500" placeholder="Example: 252">
</div>

<div id="tracker-grid" class="tracker-grid"></div>

<div class="button-row">
  <a class="button" href="submit.html">Submit a Sighting</a>
  <a class="button secondary-button" href="index.html">Back Home</a>
</div>

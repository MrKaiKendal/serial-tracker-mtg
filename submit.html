<!DOCTYPE html>
<html>
  <head>
    <title>Submit a Mox Jasper Sighting</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <section class="page">
      <div class="card wide-card">
        <div class="badge">Submit a Sighting</div>

        <h1>Submit a Mox Jasper</h1>

        <p class="subtitle">
          Use this page to report a serialized Mox Jasper sighting.
          Soon, this form will allow image uploads and proof links.
        </p>

        <form class="submit-form">
          <label>Your Name</label>
          <input type="text" placeholder="Example: Alex">

          <label>Serial Number</label>
          <input type="number" placeholder="Example: 252" min="1" max="500">

          <label>Card Image</label>
          <input type="file" accept="image/*">

          <label>Proof Link</label>
          <input type="url" placeholder="eBay, Reddit, Facebook, etc.">

          <label>Notes</label>
          <textarea placeholder="Any extra details about the card"></textarea>

         <a class="button" href="https://forms.gle/XdkgubA2P6YUnySR8" target="_blank">
  Submit Through Google Form
</a>
        </form>

        <div class="button-row">
          <a class="button secondary-button" href="tracker.html">Back to Tracker</a>
          <a class="button secondary-button" href="index.html">Back Home</a>
        </div>
      </div>
    </section>
  </body>
</html>
